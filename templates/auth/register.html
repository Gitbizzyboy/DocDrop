{% extends "base.html" %}
{% block title %}Create Account — DocDrop{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-cloud-upload-fill text-primary" style="font-size:2.5rem;"></i>
          <h2 class="fw-bold mt-2">Create your account</h2>
          <p class="text-muted">Start collecting documents in minutes</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-medium">Business Name</label>
            <input type="text" name="business_name" class="form-control form-control-lg"
                   placeholder="Smith Bookkeeping" autofocus>
            <div class="form-text">Shown on your clients' upload portals</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium">Email address</label>
            <input type="email" name="email" class="form-control form-control-lg"
                   placeholder="you@example.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium">Password</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   placeholder="At least 8 characters" required minlength="8">
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-rocket-takeoff me-2"></i>Create Account
          </button>
          <p class="text-center text-muted small mt-3 mb-0">
            No credit card required to start.
          </p>
        </form>
        <hr class="my-4">
        <p class="text-center text-muted mb-0">
          Already have an account?
          <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-medium">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
