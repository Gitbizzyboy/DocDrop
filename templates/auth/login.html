{% extends "base.html" %}
{% block title %}Login — DocDrop{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-cloud-upload-fill text-primary" style="font-size:2.5rem;"></i>
          <h2 class="fw-bold mt-2">Welcome back</h2>
          <p class="text-muted">Log in to your DocDrop account</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-medium">Email address</label>
            <input type="email" name="email" class="form-control form-control-lg"
                   placeholder="you@example.com" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium">Password</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Log In
          </button>
        </form>
        <hr class="my-4">
        <p class="text-center text-muted mb-0">
          Don't have an account?
          <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-medium">Create one free</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
